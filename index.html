<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wanza Marketing – Smart Review System</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #F5A623;
    --gold-light: #FFD580;
    --deep: #0A0E1A;
    --mid: #111827;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #F0F4FF;
    --muted: rgba(240,244,255,0.5);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--deep);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── Ambient background ── */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 420px; height: 420px; background: radial-gradient(circle, rgba(245,166,35,0.18) 0%, transparent 70%); top: -100px; right: -100px; }
  .orb2 { width: 320px; height: 320px; background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%); bottom: -60px; left: -80px; }
  .orb3 { width: 200px; height: 200px; background: radial-gradient(circle, rgba(245,166,35,0.1) 0%, transparent 70%); bottom: 30%; right: 10%; }

  /* Subtle grid */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ── Card ── */
  .card {
    position: relative; z-index: 1;
    width: min(88vw, 400px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 48px 36px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 40px 80px rgba(0,0,0,0.6);
    animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Logo badge ── */
  .logo-wrap {
    width: 82px; height: 82px;
    background: linear-gradient(135deg, #1a1f30 0%, #0d1120 100%);
    border: 1.5px solid rgba(245,166,35,0.35);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px;
    box-shadow: 0 0 30px rgba(245,166,35,0.12), inset 0 1px 0 rgba(255,255,255,0.06);
    position: relative; overflow: hidden;
  }
  .logo-wrap::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(245,166,35,0.08) 0%, transparent 60%);
  }
  .logo-letter {
    font-family: 'Sora', sans-serif;
    font-size: 36px; font-weight: 800;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }

  /* ── Badge pill ── */
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(245,166,35,0.1);
    border: 1px solid rgba(245,166,35,0.25);
    border-radius: 100px;
    padding: 4px 14px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
    color: var(--gold-light);
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

  /* ── Headline ── */
  h1 {
    font-family: 'Sora', sans-serif;
    font-size: clamp(22px, 6vw, 28px);
    font-weight: 800;
    letter-spacing: -0.5px;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.6) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .emoji { -webkit-text-fill-color: initial; }

  /* ── Sub ── */
  .subtext {
    font-size: 13.5px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
    margin-bottom: 36px;
    font-weight: 400;
  }

  /* ── Loader ── */
  .loader-wrap { width: 100%; margin-bottom: 32px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .progress-track {
    width: 100%; height: 3px;
    background: rgba(255,255,255,0.07);
    border-radius: 100px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 100px;
    width: 0%;
    animation: fillBar 1.8s cubic-bezier(0.4,0,0.2,1) 0.4s forwards;
    box-shadow: 0 0 12px rgba(245,166,35,0.5);
  }
  @keyframes fillBar { to { width: 100%; } }
  .loader-dots { display: flex; gap: 6px; align-items: center; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.2); }
  .dot:nth-child(1){animation:dotBlink 1.2s 0s infinite;}
  .dot:nth-child(2){animation:dotBlink 1.2s 0.2s infinite;}
  .dot:nth-child(3){animation:dotBlink 1.2s 0.4s infinite;}
  @keyframes dotBlink{0%,100%{background:rgba(255,255,255,0.15)}50%{background:var(--gold)}}

  /* ── Trust line ── */
  .trust {
    display: flex; align-items: center; gap: 10px;
    font-size: 11.5px; color: rgba(255,255,255,0.35);
    letter-spacing: 0.04em;
    margin-bottom: 36px;
  }
  .trust-sep { width: 1px; height: 10px; background: rgba(255,255,255,0.15); }

  /* ── Divider ── */
  .divider { width: 100%; height: 1px; background: var(--border); margin-bottom: 20px; }

  /* ── Footer ── */
  .footer-brand {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.06em;
    text-align: center;
  }
  .footer-brand span { color: rgba(245,166,35,0.6); font-weight: 600; }
</style>
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<div class="card">
  <div class="logo-wrap">
    <span class="logo-letter">W</span>
  </div>

  <div class="badge">
    <span class="badge-dot"></span>
    Wanza Marketing
  </div>

  <h1><span class="emoji">🚀</span> Smart Review System</h1>

  <p class="subtext">Preparing your personalised review page,<br>please wait a moment…</p>

  <div class="loader-wrap">
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="loader-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <div class="trust">
    <span>🔒 Secure</span>
    <span class="trust-sep"></span>
    <span>⚡ Fast</span>
    <span class="trust-sep"></span>
    <span>✅ Trusted by Businesses</span>
  </div>

  <div class="divider"></div>
  <p class="footer-brand">Powered by <span>Wanza Marketing</span></p>
</div>

<script>
  (function () {
    const p = new URLSearchParams(window.location.search);
    const cid = p.get('cid') || '';
    const uid = p.get('uid') || '';
    setTimeout(function () {
      window.location.href = 'client.html?cid=' + encodeURIComponent(cid) + '&uid=' + encodeURIComponent(uid);
    }, 2000);
  })();
</script>
</body>
</html>
